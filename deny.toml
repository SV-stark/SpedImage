# cargo-deny configuration

[advisories]
version = 2
ignore = []

[licenses]
version = 2
# MIT and Apache-2.0 are standard in Rust ecosystem
# All licenses not in allow or exceptions are denied by default in version 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
