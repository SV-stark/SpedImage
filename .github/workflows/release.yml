name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-release:
    name: build-release
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CARGO: cargo
      TARGET_DIR: ./target
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Set up NSIS
        uses: negrutiu/nsis-install@v1

      - name: Build archive and installer
        shell: bash
        run: |
          outdir="./target/x86_64-pc-windows-msvc/release"
          version="${GITHUB_REF#refs/tags/}"
          staging="spedimage-$version-x86_64-pc-windows-msvc"
          
          # Create ZIP archive
          mkdir -p "$staging"
          cp "$outdir/spedimage.exe" "$staging/"
          7z a "$staging.zip" "$staging"
          
          # Create EXE installer (NSIS)
          # We need to copy the binary to the path expected by installer.nsi
          mkdir -p target/release
          cp "$outdir/spedimage.exe" target/release/
          makensis installer.nsi
          
          echo "ASSET_ZIP=$staging.zip" >> $GITHUB_ENV
          echo "ASSET_EXE=SpedImage_Setup.exe" >> $GITHUB_ENV

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET_ZIP }}
            ${{ env.ASSET_EXE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
