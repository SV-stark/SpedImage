name: Build and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-sdl2

    - name: Build SpedImage
      shell: msys2 {0}
      run: |
        gcc -std=c99 -Wall -Wextra -DSDL_MAIN_HANDLED src/*.c -o src/SpedImage.exe -Iinclude -lmingw32 -lSDL2main -lSDL2 -lm

    - name: Prepare Artifacts
      shell: msys2 {0}
      run: |
        mkdir -p bin
        cp /mingw64/bin/SDL2.dll bin/
        # Add any other DLLs if needed (e.g. libwinpthread-1.dll)
        cp /mingw64/bin/libwinpthread-1.dll bin/

    - name: Compile Installer
      shell: pwsh
      run: |
        & "iscc" build/installer.iss

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SpedImage-Installer
        path: build/Output/SpedImage_Setup.exe
