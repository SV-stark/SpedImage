[package]
name = "spedimage"
version = "2.0.0"
edition = "2021"
description = "Ultra-Lightweight GPU-Accelerated Image Viewer"
authors = ["SpedImage Team"]
license = "MIT"
rust-version = "1.75"

[dependencies]
# Windowing
winit = { version = "0.30", features = ["rwh_06"] }

# GPU Rendering
wgpu = "0.20"

# Image decoding (pure Rust)
image = { version = "0.24", default-features = false, features = [
    "jpeg",
    "png",
    "gif",
    "bmp",
    "tga",
    "tiff",
    "webp",
] }

# Text Rendering
wgpu_text = "0.9"

# File dialog (native)
rfd = "0.14"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "1"
anyhow = "1"

# Async blocking
pollster = "0.3"

# Keyboard shortcuts (using winit's built-in handling)
# keyboard-types removed - not needed

# Directory paths
# dirs removed - not needed

# For image manipulation
fast_image_resize = "3"

# For GPU data types
bytemuck = { version = "1", features = ["derive"] }

# Clipboard support
# arboard removed - not needed

[features]
default = []
heif = []

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_Graphics_Imaging",
    "Win32_System_Com",
    "Win32_Storage_Streams",
    "Win32_Storage_FileSystem",
] }

[lib]
name = "spedimage_lib"
path = "src/lib.rs"

[[bin]]
name = "spedimage"
path = "src/main.rs"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
